<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BatikHub - Buka Toko Batik</title>
  <!-- Menggunakan Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons untuk ikon modern -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#FBF9F4] text-stone-800 antialiased">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 bg-white border-b border-stone-200/60 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center">
          <a href="#" class="text-2xl font-serif font-bold text-emerald-900 flex items-center gap-2 tracking-wide">
            <i data-lucide="sparkles" class="w-6 h-6 text-amber-600"></i>
            Batik<span class="text-amber-700 font-sans font-medium text-xl">Hub</span>
          </a>
        </div>

        <!-- Menu Navigasi -->
        <div class="flex items-center gap-1 sm:gap-4">
          <!-- Menu Promo -->
          <a href="#promo" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium text-stone-600 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            <i data-lucide="tag" class="w-4 h-4 text-stone-400"></i>
            <span>Promo</span>
          </a>

          <!-- Menu Cari -->
          <a href="#cari" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium text-stone-600 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            <i data-lucide="search" class="w-4 h-4 text-stone-400"></i>
            <span>Cari</span>
          </a>

          <!-- Menu Pengiriman -->
          <a href="#pengiriman" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium text-stone-600 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            <i data-lucide="truck" class="w-4 h-4 text-stone-400"></i>
            <span>Pengiriman</span>
          </a>

          <!-- Pembatas -->
          <div class="h-5 w-px bg-stone-200 mx-1 hidden sm:block"></div>

          <!-- Menu Profile -->
          <a href="#profile" class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 rounded-full border border-emerald-200 shadow-sm">
            <div class="w-7 h-7 rounded-full bg-emerald-800 text-amber-200 flex items-center justify-center text-xs font-semibold uppercase">
              R
            </div>
            <span class="text-xs font-medium text-emerald-900 hidden sm:inline">Rapi</span>
          </a>
        </div>

      </div>
    </div>
  </nav>

  <!-- KONTEN UTAMA HALAMAN DAFTAR SELLER -->
  <main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    
    <!-- FORM PENDAFTARAN TOKO -->
    <form class="bg-white rounded-2xl border border-stone-200/80 shadow-md overflow-hidden">
      
      <!-- Header Banner (Aksen Warna Emas/Amber Khas Seller) -->
      <div class="bg-gradient-to-r from-amber-700 to-amber-600 px-6 py-8 text-white flex items-center gap-4">
        <div class="w-14 h-14 rounded-2xl bg-white/10 backdrop-blur-sm text-amber-100 flex items-center justify-center shadow-inner border border-white/20 flex-shrink-0">
          <i data-lucide="store" class="w-7 h-7"></i>
        </div>
        <div>
          <h1 class="text-xl font-serif font-bold tracking-wide text-white">Buka Toko Batik Anda</h1>
          <p class="text-xs text-amber-50/90">Lengkapi data di bawah untuk bergabung sebagai mitra penjual BatikHub</p>
        </div>
      </div>

      <!-- Input Fields Area -->
      <div class="p-6 sm:p-8 space-y-6">
        
        <!-- SECTION 1: PROFIL TOKO -->
        <div class="space-y-4">
          <h2 class="text-xs font-semibold text-amber-900 uppercase tracking-wider border-b border-stone-100 pb-2 flex items-center gap-1.5">
            <i data-lucide="info" class="w-3.5 h-3.5"></i> Profil Usaha
          </h2>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Nama Toko -->
            <div class="space-y-1.5">
              <label class="text-xs font-medium text-stone-500 block">Nama Toko</label>
              <input 
                type="text" 
                required
                class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 transition-all placeholder-stone-400"
                placeholder="Contoh: Batik Indah Berkah"
              >
            </div>

            <!-- Nama Owner -->
            <div class="space-y-1.5">
              <label class="text-xs font-medium text-stone-500 block">Nama Pemilik (Owner)</label>
              <input 
                type="text" 
                required
                class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 transition-all placeholder-stone-400"
                placeholder="Nama lengkap pemilik"
              >
            </div>
          </div>
        </div>

        <!-- SECTION 2: KREDENSIAL AKUN -->
        <div class="space-y-4 pt-2">
          <h2 class="text-xs font-semibold text-amber-900 uppercase tracking-wider border-b border-stone-100 pb-2 flex items-center gap-1.5">
            <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Kredensial Masuk
          </h2>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Email -->
            <div class="space-y-1.5">
              <label class="text-xs font-medium text-stone-500 block">Email Toko / Penjual</label>
              <input 
                type="email" 
                required
                class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 transition-all placeholder-stone-400"
                placeholder="seller@email.com"
              >
            </div>

            <!-- Password -->
            <div class="space-y-1.5">
              <label class="text-xs font-medium text-stone-500 block">Kata Sandi (Password)</label>
              <div class="relative">
                <input 
                  type="password" 
                  required
                  class="w-full bg-white border border-stone-200 rounded-xl pl-4 pr-12 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 transition-all placeholder-stone-400 font-mono"
                  placeholder="••••••••"
                >
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                  <i data-lucide="eye" class="w-4 h-4 text-stone-400 cursor-pointer hover:text-stone-600"></i>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- SECTION 3: ALAMAT TOKO -->
        <div class="space-y-4 pt-2">
          <h2 class="text-xs font-semibold text-amber-900 uppercase tracking-wider border-b border-stone-100 pb-2 flex items-center gap-1.5">
            <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> Alamat Operasional / Penjemputan Kurir
          </h2>

          <!-- Nama Jalan -->
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-stone-500 block">Nama Jalan & No. Bangunan</label>
            <textarea 
              rows="2" 
              required
              class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 transition-all placeholder-stone-400 leading-relaxed"
              placeholder="Sebutkan nama jalan, blok, nomor ruko, atau detail patokan..."
            ></textarea>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Kota -->
            <div class="space-y-1.5">
              <label class="text-xs font-medium text-stone-500 block">Kota / Kabupaten</label>
              <input 
                type="text" 
                required
                class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 transition-all placeholder-stone-400"
                placeholder="Contoh: Pekanbaru"
              >
            </div>

            <!-- Provinsi -->
            <div class="space-y-1.5">
              <label class="text-xs font-medium text-stone-500 block">Provinsi</label>
              <input 
                type="text" 
                required
                class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-amber-600 focus:border-amber-600 transition-all placeholder-stone-400"
                placeholder="Contoh: Riau"
              >
            </div>
          </div>
        </div>

        <!-- AREA TOMBOL DAFTAR & BATAL -->
        <div class="flex items-center justify-end gap-3 pt-6 border-t border-stone-100 mt-8">
          <!-- Tombol Batal -->
          <button 
            type="button" 
            class="px-5 py-2.5 border border-stone-200 rounded-xl text-sm font-medium text-stone-600 bg-white hover:bg-stone-50 hover:text-stone-800 active:scale-95 transition-all shadow-sm"
          >
            Batal
          </button>
          <!-- Tombol Buka Toko -->
          <button 
            type="submit" 
            class="px-6 py-2.5 bg-amber-600 text-white rounded-xl text-sm font-medium hover:bg-amber-700 active:scale-95 transition-all shadow-md flex items-center gap-1.5"
          >
            <i data-lucide="check-circle" class="w-4 h-4"></i> Buka Toko Sekarang
          </button>
        </div>

      </div>

    </form>

  </main>

  <!-- Script untuk inisialisasi Lucide Icons -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
