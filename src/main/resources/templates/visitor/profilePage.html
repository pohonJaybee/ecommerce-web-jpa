<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BatikHub - Profil Saya</title>
  <!-- Menggunakan Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons untuk ikon modern -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#FBF9F4] text-stone-800 antialiased">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 bg-white border-b border-stone-200/60 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center">
          <a href="#" class="text-2xl font-serif font-bold text-emerald-900 flex items-center gap-2 tracking-wide">
            <i data-lucide="sparkles" class="w-6 h-6 text-amber-600"></i>
            Batik<span class="text-amber-700 font-sans font-medium text-xl">Hub</span>
          </a>
        </div>

        <!-- Menu Navigasi -->
        <div class="flex items-center gap-1 sm:gap-4">
          <!-- Menu Promo -->
          <a href="#promo" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium text-stone-600 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            <i data-lucide="tag" class="w-4 h-4 text-stone-400"></i>
            <span>Promo</span>
          </a>

          <!-- Menu Cari -->
          <a href="#cari" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium text-stone-600 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            <i data-lucide="search" class="w-4 h-4 text-stone-400"></i>
            <span>Cari</span>
          </a>

          <!-- Menu Pengiriman -->
          <a href="#pengiriman" class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm font-medium text-stone-600 hover:bg-stone-100 hover:text-stone-900 transition-colors">
            <i data-lucide="truck" class="w-4 h-4 text-stone-400"></i>
            <span>Pengiriman</span>
          </a>

          <!-- Pembatas -->
          <div class="h-5 w-px bg-stone-200 mx-1 hidden sm:block"></div>

          <!-- Menu Profile (Aktif - State User Login) -->
          <a href="#profile" class="flex items-center gap-2 px-3 py-1.5 bg-emerald-50 rounded-full border border-emerald-200 shadow-sm">
            <div class="w-7 h-7 rounded-full bg-emerald-800 text-amber-200 flex items-center justify-center text-xs font-semibold uppercase">
              S
            </div>
            <span class="text-xs font-medium text-emerald-900 hidden sm:inline">Syahmi</span>
          </a>
        </div>

      </div>
    </div>
  </nav>

  <!-- KONTEN UTAMA HALAMAN PROFIL -->
  <main class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    
    <!-- CARD UTAMA PROFIL -->
    <div class="bg-white rounded-2xl border border-stone-200/80 shadow-sm overflow-hidden">
      
      <!-- Bagian Header Profil (Background Aksen Hijau & Tombol Aksi) -->
      <div class="bg-gradient-to-r from-emerald-950 to-emerald-900 px-6 py-8 relative text-white flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div class="flex items-center gap-4">
          <!-- Avatar Lingkaran Besar -->
          <div class="w-16 h-16 sm:w-20 sm:h-20 rounded-2xl bg-amber-500 text-stone-950 flex items-center justify-center text-2xl font-serif font-bold shadow-md border-2 border-white/20">
            AS
          </div>
          <div>
            <h1 class="text-xl sm:text-2xl font-serif font-bold tracking-wide text-amber-100">Aidil Syahmi</h1>
            <p class="text-xs text-emerald-200/80">Anggota Premium BatikHub</p>
          </div>
        </div>

        <!-- Tombol Edit & Logout -->
        <div class="flex items-center gap-2 w-full sm:w-auto justify-end pt-2 sm:pt-0">
          <button class="flex items-center gap-1.5 bg-white/10 backdrop-blur-sm border border-white/20 px-4 py-2 rounded-xl text-xs font-medium hover:bg-white/20 active:scale-95 transition-all">
            <i data-lucide="edit-3" class="w-3.5 h-3.5"></i> Edit
          </button>
          <button class="flex items-center gap-1.5 bg-red-600/90 text-white px-4 py-2 rounded-xl text-xs font-medium hover:bg-red-700 active:scale-95 transition-all shadow-sm">
            <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Keluar
          </button>
        </div>
      </div>

      <!-- Bagian Form / Detail Data Pengguna -->
      <div class="p-6 sm:p-8 space-y-6">

        <h2 class="text-sm font-semibold text-emerald-950 uppercase tracking-wider border-b border-stone-100 pb-2 pt-2">Informasi Akun</h2>

        <!-- GRID DATA AKUN -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          
          <!-- KELOMPOK ID PENGGUNA (FITUR BARU - AUTO GENERATE & LOCKED) -->
          <div class="space-y-1.5 md:col-span-2">
            <label class="text-xs font-medium text-stone-400 flex items-center gap-1">
              ID Pengguna <i data-lucide="lock" class="w-3 h-3 text-stone-400"></i>
            </label>
            <div class="w-full bg-stone-100 border border-stone-200/80 rounded-xl px-4 py-3 text-sm text-stone-400 font-mono flex items-center gap-2 select-none">
              <span class="bg-stone-200 px-1.5 py-0.5 rounded text-[10px] text-stone-500 font-sans uppercase font-semibold">System</span>
              <span>USR-2026-0521-0089</span>
            </div>
            <p class="text-[10px] text-stone-400 italic">ID dibuat otomatis oleh sistem dan tidak dapat diubah demi keamanan akun.</p>
          </div>

          <!-- Kolom Nama -->
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-stone-400 block">Nama Lengkap</label>
            <div class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-700 font-medium">
              Aidil Syahmi
            </div>
          </div>

          <!-- Kolom Email -->
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-stone-400 block">Alamat Email</label>
            <div class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-700 font-medium">
              aidillogoi@example.com
            </div>
          </div>

          <!-- Kolom Password -->
          <div class="space-y-1.5 md:col-span-2">
            <label class="text-xs font-medium text-stone-400 block">Kata Sandi (Password)</label>
            <div class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-500 font-mono flex justify-between items-center">
              <span>aidil-123</span>
              <i data-lucide="eye-off" class="w-4 h-4 text-stone-400 cursor-pointer hover:text-stone-600"></i>
            </div>
          </div>
        </div>

        <h2 class="text-sm font-semibold text-emerald-950 uppercase tracking-wider border-b border-stone-100 pb-2 pt-4">Alamat Pengiriman</h2>

        <!-- Detail Alamat Breakdown -->
        <div class="space-y-4">
          <!-- Jalan -->
          <div class="space-y-1.5">
            <label class="text-xs font-medium text-stone-400 block">Nama Jalan</label>
            <div class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-700 leading-relaxed">
              Jl. ABC
            </div>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Kota -->
            <div class="space-y-1.5">
              <label class="text-xs font-medium text-stone-400 block">Kota / Kabupaten</label>
              <div class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-700">
                Pekanbaru
              </div>
            </div>

            <!-- Provinsi -->
            <div class="space-y-1.5">
              <label class="text-xs font-medium text-stone-400 block">Provinsi</label>
              <div class="w-full bg-stone-50 border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-700">
                Riau
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>

  </main>

  <!-- Script untuk inisialisasi Lucide Icons -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
