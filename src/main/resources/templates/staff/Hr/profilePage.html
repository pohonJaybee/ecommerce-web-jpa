<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Panel - Profile Pengelola</title>
  <!-- Menggunakan Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons untuk ikon modern -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#FBF9F4] text-stone-800 antialiased min-h-screen flex flex-col justify-between">

  <!-- NAVBAR UTAMA SYSTEM (STAFF / SELLER) -->
  <nav class="bg-white border-b border-stone-200/60 shadow-sm w-full sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        
        <!-- Logo & Tag Staff -->
        <div class="flex-shrink-0 flex items-center gap-3">
          <a href="#" class="text-2xl font-serif font-bold text-emerald-900 flex items-center gap-2 tracking-wide">
            <i data-lucide="sparkles" class="w-6 h-6 text-amber-600"></i>
            Batik<span class="text-amber-700 font-sans font-medium text-xl">Hub</span>
          </a>
          <span class="bg-stone-100 text-stone-700 text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider border border-stone-200 shadow-sm">
            Staff Dashboard
          </span>
        </div>

        <!-- Identitas Singkat Akun -->
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-amber-600 text-white flex items-center justify-center text-xs font-bold font-mono">
            CEO
          </div>
          <span class="text-xs font-medium text-stone-600 hidden sm:inline">Rapi (CEO)</span>
        </div>

      </div>
    </div>
  </nav>

  <!-- KONTEN UTAMA DASHBOARD STAFF -->
  <main class="max-w-4xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex-grow space-y-6">
    
    <!-- NAVBAR INTERNAL (OMSET, LIST, SEDANG DIKIRIM, PROFILE) -->
    <div class="bg-white p-2 rounded-2xl border border-stone-200/80 shadow-sm flex items-center gap-1 overflow-x-auto">
      <!-- 1. Omset -->
      <a href="#omset" class="flex items-center justify-center gap-2 px-5 py-2.5 text-stone-500 hover:text-amber-700 hover:bg-stone-50 text-xs font-medium rounded-xl transition-all flex-shrink-0">
        <i data-lucide="trending-up" class="w-4 h-4 text-stone-400"></i>
        <span>Omset</span>
      </a>

      <!-- 2. List -->
      <a href="#list" class="flex items-center justify-center gap-2 px-5 py-2.5 text-stone-500 hover:text-amber-700 hover:bg-stone-50 text-xs font-medium rounded-xl transition-all flex-shrink-0">
        <i data-lucide="package" class="w-4 h-4 text-stone-400"></i>
        <span>List</span>
      </a>

      <!-- 3. Sedang Dikirim -->
      <a href="#dikirim" class="flex items-center justify-center gap-2 px-5 py-2.5 text-stone-500 hover:text-amber-700 hover:bg-stone-50 text-xs font-medium rounded-xl transition-all flex-shrink-0">
        <i data-lucide="truck" class="w-4 h-4 text-stone-400"></i>
        <span>Sedang Dikirim</span>
      </a>

      <!-- 4. Profile (Aktif) -->
      <a href="#profile" class="flex items-center justify-center gap-2 px-5 py-2.5 bg-amber-600 text-white text-xs font-semibold rounded-xl shadow-sm transition-all flex-shrink-0">
        <i data-lucide="user-cog" class="w-4 h-4"></i>
        <span>Profile</span>
      </a>
    </div>

    <!-- KARTU UTAMA PROFILE -->
    <div class="bg-white rounded-2xl border border-stone-200/80 shadow-sm overflow-hidden">
      
      <!-- Bagian Atas: Cover Motif Minimalis -->
      <div class="h-24 bg-gradient-to-r from-amber-700 to-emerald-900 p-6 flex items-end relative">
        <!-- Avatar Logged In User -->
        <div class="absolute -bottom-8 left-6 w-16 h-16 bg-white border-4 border-white rounded-xl shadow-md flex items-center justify-center text-amber-700">
          <i data-lucide="user-check" class="w-7 h-7"></i>
        </div>
      </div>

      <!-- Detail Informasi Akun -->
      <div class="p-6 pt-12 space-y-6">
        
        <!-- DISPLAY ROLE & ID KARYAWAN -->
        <div class="flex flex-wrap items-center gap-3">
          <div>
            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-wider block mb-1">Jabatan Kontrol</span>
            <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-amber-50 text-amber-800 text-xs font-bold rounded-lg border border-amber-200/60 shadow-sm">
              <i data-lucide="shield" class="w-3.5 h-3.5"></i> Chief Executive Officer (CEO) 
            </span>
          </div>
          <div>
            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-wider block mb-1">ID Karyawan</span>
            <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-stone-100 text-stone-700 text-xs font-mono font-bold rounded-lg border border-stone-200/60 shadow-sm">
              <i data-lucide="id-card" class="w-3.5 h-3.5 text-stone-500"></i> STF-2026-0042
            </span>
          </div>
        </div>

        <!-- AREA INFORMASI AKUN (TEKS STATIS / READ-ONLY) -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-stone-50/50 p-4 rounded-xl border border-stone-100 shadow-inner">
          <!-- Nama -->
          <div class="space-y-1">
            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-wider block">Nama Lengkap</span>
            <p class="text-stone-800 font-semibold text-sm px-1 py-0.5">Rapi</p>
          </div>

          <!-- Email -->
          <div class="space-y-1">
            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-wider block">Email Sistem</span>
            <p class="text-stone-800 font-mono text-sm px-1 py-0.5">rapi@batikhub.com</p>
          </div>

          <!-- Password -->
          <div class="space-y-1 md:col-span-2">
            <span class="text-[10px] font-bold text-stone-400 uppercase tracking-wider block">Kata Sandi (Password)</span>
            <p class="text-stone-800 font-mono text-sm px-1 py-0.5 tracking-wide">rapi-123</p>
          </div>
        </div>

        <hr class="border-stone-100">

        <!-- TOMBOL AKSI UTAMA -->
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div class="flex items-center gap-2 flex-wrap">
            <!-- Tombol Edit Profile -->
            <button type="button" class="flex items-center gap-2 bg-amber-600 hover:bg-amber-700 text-white font-semibold text-xs px-4 py-2.5 rounded-xl transition-colors shadow-sm">
              <i data-lucide="edit-3" class="w-3.5 h-3.5"></i> Edit Profile
            </button>
            
            <!-- Tombol Tambah Karyawan Baru -->
            <button type="button" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xs px-4 py-2.5 rounded-xl transition-colors shadow-sm">
              <i data-lucide="user-plus" class="w-3.5 h-3.5"></i> Tambah Karyawan Baru
            </button>

            <!-- Tombol Khusus CEO & HR: Lihat Seluruh Karyawan -->
            <button type="button" class="flex items-center gap-2 bg-stone-800 hover:bg-stone-900 text-white font-semibold text-xs px-4 py-2.5 rounded-xl transition-colors shadow-sm">
              <i data-lucide="users" class="w-3.5 h-3.5 text-amber-400"></i> Lihat Seluruh Karyawan
            </button>
          </div>
          
          <!-- Tombol Logout -->
          <button type="button" class="flex items-center gap-2 bg-red-50 hover:bg-red-100 text-red-600 font-bold text-xs px-4 py-2.5 rounded-xl border border-red-200/60 transition-colors">
            <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Logout
          </button>
        </div>

      </div>
    </div>

  </main>

  <!-- FOOTER PANEL -->
  <footer class="text-center py-6 text-xs text-stone-400 w-full bg-white border-t border-stone-100">
    &copy; 2026 BatikHub Staff Hub Nusantara. Dashboard Manajemen Internal.
  </footer>

  <!-- CDN script untuk render icon Lucide -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
