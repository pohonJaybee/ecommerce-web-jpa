<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Panel - Tambah Produk Baru</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#FBF9F4] text-stone-800 antialiased min-h-screen flex flex-col justify-between">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-stone-200/60 shadow-sm w-full sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <div class="flex-shrink-0 flex items-center gap-3">
          <a href="#" class="text-2xl font-serif font-bold text-emerald-900 flex items-center gap-2 tracking-wide">
            <i data-lucide="sparkles" class="w-6 h-6 text-amber-600"></i>
            Batik<span class="text-amber-700 font-sans font-medium text-xl">Hub</span>
          </a>
          <span class="bg-stone-100 text-stone-700 text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider border border-stone-200 shadow-sm">
            Staff Dashboard
          </span>
        </div>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-emerald-800 text-white flex items-center justify-center text-xs font-bold font-mono">
            ST
          </div>
          <span class="text-xs font-medium text-stone-600 hidden sm:inline">Taufiq (Marketing)</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- KONTEN UTAMA: FORM TAMBAH PRODUK -->
  <main class="max-w-3xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex-grow space-y-4">
    
    <!-- Tombol Kembali -->
    <div class="flex items-center justify-between">
      <a href="#dashboard" class="inline-flex items-center gap-2 text-xs font-semibold text-stone-600 hover:text-amber-700 bg-white px-4 py-2 rounded-xl border border-stone-200/80 shadow-sm transition-all active:scale-95">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Dashboard
      </a>
    </div>

    <!-- Kotak Form -->
    <div class="bg-white rounded-2xl border border-stone-200/80 shadow-sm overflow-hidden">
      
      <!-- Header Form -->
      <div class="px-6 py-5 bg-stone-50 border-b border-stone-100 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-900 flex items-center justify-center text-amber-400 shadow-sm">
          <i data-lucide="package-plus" class="w-5 h-5"></i>
        </div>
        <div>
          <h1 class="text-base font-bold text-stone-950">Tambah Produk Baru</h1>
          <p class="text-xs text-stone-500">Isi data produk katalog BatikHub dengan lengkap dan valid.</p>
        </div>
      </div>

      <!-- Tag Form (Meneruskan data ke endpoint backend Spring Boot) -->
      <form action="/api/products" method="POST" enctype="multipart/form-data" class="p-6 space-y-5">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <!-- 1. Kode Produk -->
          <div class="space-y-1.5">
            <label class="block text-xs font-bold text-stone-600 uppercase tracking-wider">Kode Produk</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-stone-400">
                <i data-lucide="binary" class="w-4 h-4"></i>
              </div>
              <input type="text" name="kodeProduk" placeholder="Contoh: BTK-KAI-001" required
                class="block w-full pl-10 pr-4 py-2.5 border border-stone-200 rounded-xl bg-white placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-emerald-800 text-sm">
            </div>
          </div>

          <!-- 2. Tipe Produk (Dropdown) -->
          <div class="space-y-1.5">
            <label class="block text-xs font-bold text-stone-600 uppercase tracking-wider">Tipe Produk</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-stone-400">
                <i data-lucide="layers" class="w-4 h-4"></i>
              </div>
              <select name="tipe" required
                class="block w-full pl-10 pr-4 py-2.5 border border-stone-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-emerald-800 text-sm appearance-none text-stone-700">
                <option value="" disabled selected>Pilih Tipe...</option>
                <option value="KAIN">Kain</option>
                <option value="BAJU">Baju</option>
                <option value="AKSESORIS">Aksesoris</option>
              </select>
              <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-stone-400">
                <i data-lucide="chevron-down" class="w-4 h-4"></i>
              </div>
            </div>
          </div>
        </div>

        <!-- 3. Nama Produk -->
        <div class="space-y-1.5">
          <label class="block text-xs font-bold text-stone-600 uppercase tracking-wider">Nama Produk</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-stone-400">
              <i data-lucide="tag" class="w-4 h-4"></i>
            </div>
            <input type="text" name="namaProduk" placeholder="Masukkan nama koleksi batik..." required
              class="block w-full pl-10 pr-4 py-2.5 border border-stone-200 rounded-xl bg-white placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-emerald-800 text-sm">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <!-- 4. Harga Produk -->
          <div class="space-y-1.5">
            <label class="block text-xs font-bold text-stone-600 uppercase tracking-wider">Harga (Rupiah)</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none font-semibold text-xs text-stone-400">
                Rp
              </div>
              <input type="number" name="harga" placeholder="0" min="0" required
                class="block w-full pl-10 pr-4 py-2.5 border border-stone-200 rounded-xl bg-white placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-emerald-800 text-sm font-medium">
            </div>
          </div>

          <!-- 5. Stock Produk -->
          <div class="space-y-1.5">
            <label class="block text-xs font-bold text-stone-600 uppercase tracking-wider">Jumlah Stock</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-stone-400">
                <i data-lucide="boxes" class="w-4 h-4"></i>
              </div>
              <input type="number" name="stock" placeholder="0" min="0" required
                class="block w-full pl-10 pr-4 py-2.5 border border-stone-200 rounded-xl bg-white placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-emerald-800 text-sm font-medium">
            </div>
          </div>
        </div>

        <!-- 6. Input Gambar Produk (Bawaan Browser / Native File Input) -->
        <div class="space-y-1.5">
          <label class="block text-xs font-bold text-stone-600 uppercase tracking-wider">Gambar Produk</label>
          <input 
            type="file" 
            name="gambar" 
            accept="image/*" 
            required
            class="block w-full text-sm text-stone-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-emerald-50 file:text-emerald-800 hover:file:bg-emerald-100 border border-stone-200 rounded-xl p-1 bg-stone-50/50 cursor-pointer"
          >
          <p class="text-[10px] text-stone-400 pl-1">Format dokumen: PNG, JPG, JPEG (Maksimal 2MB)</p>
        </div>

        <!-- Tombol Aksi -->
        <div class="flex items-center justify-end gap-3 pt-3 border-t border-stone-100">
          <button type="reset" class="px-5 py-2.5 border border-stone-200 rounded-xl text-xs font-semibold text-stone-600 hover:bg-stone-50 transition-colors">
            Reset Form
          </button>
          <button type="submit" class="flex items-center gap-2 bg-emerald-800 hover:bg-emerald-900 text-white text-xs font-semibold px-6 py-2.5 rounded-xl transition-all shadow-sm active:scale-[0.98]">
            <i data-lucide="save" class="w-4 h-4"></i> Simpan Produk
          </button>
        </div>

      </form>
    </div>
  </main>

  <footer class="text-center py-6 text-xs text-stone-400 w-full bg-white border-t border-stone-100">
    &copy; 2026 BatikHub Staff Hub Nusantara. Dashboard Manajemen Internal.
  </footer>

  <!-- Script hanya untuk me-render komponen Ikon Lucide -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
