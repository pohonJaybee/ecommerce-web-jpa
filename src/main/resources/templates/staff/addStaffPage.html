<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Panel - Tambah Karyawan</title>
  <!-- Menggunakan Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons untuk ikon modern -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#FBF9F4] text-stone-800 antialiased min-h-screen flex flex-col justify-between">

  <!-- NAVBAR UTAMA SYSTEM -->
  <nav class="bg-white border-b border-stone-200/60 shadow-sm w-full sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        
        <!-- Logo & Tag Staff -->
        <div class="flex-shrink-0 flex items-center gap-3">
          <a href="#" class="text-2xl font-serif font-bold text-emerald-900 flex items-center gap-2 tracking-wide">
            <i data-lucide="sparkles" class="w-6 h-6 text-amber-600"></i>
            Batik<span class="text-amber-700 font-sans font-medium text-xl">Hub</span>
          </a>
          <span class="bg-stone-100 text-stone-700 text-[10px] font-bold px-2 py-0.5 rounded-md uppercase tracking-wider border border-stone-200 shadow-sm">
            Staff Dashboard
          </span>
        </div>

        <!-- Identitas Singkat Akun Login -->
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 rounded-lg bg-amber-600 text-white flex items-center justify-center text-xs font-bold font-mono">
            ST
          </div>
          <span class="text-xs font-medium text-stone-600 hidden sm:inline">Rapi (Internal Staff)</span>
        </div>

      </div>
    </div>
  </nav>

  <!-- KONTEN UTAMA -->
  <main class="max-w-3xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex-grow">
    
    <!-- KARTU FORM TAMBAH KARYAWAN -->
    <div class="bg-white rounded-2xl border border-stone-200/80 shadow-sm overflow-hidden">
      
      <!-- Header Form -->
      <div class="bg-stone-50 px-6 py-5 border-b border-stone-100 flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-700 border border-emerald-200/50">
          <i data-lucide="user-plus" class="w-5 h-5"></i>
        </div>
        <div>
          <h1 class="text-base font-bold text-stone-900">Tambah Karyawan Baru</h1>
          <p class="text-xs text-stone-500">Daftarkan akun internal baru untuk hak akses sistem pengelola.</p>
        </div>
      </div>

      <!-- Body Form -->
      <form class="p-6 space-y-5">
        
        <!-- Input Nama -->
        <div class="space-y-1.5">
          <label for="regNama" class="text-[10px] font-bold text-stone-500 uppercase tracking-wider block">Nama Lengkap</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-stone-400">
              <i data-lucide="user" class="w-4 h-4"></i>
            </span>
            <input type="text" id="regNama" class="w-full pl-10 pr-4 py-2.5 bg-white text-stone-800 text-sm font-medium rounded-xl border border-stone-200 focus:outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition-all shadow-sm" placeholder="Masukkan nama lengkap karyawan">
          </div>
        </div>

        <!-- Input Email -->
        <div class="space-y-1.5">
          <label for="regEmail" class="text-[10px] font-bold text-stone-500 uppercase tracking-wider block">Alamat Email Sistem</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-stone-400">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input type="email" id="regEmail" class="w-full pl-10 pr-4 py-2.5 bg-white text-stone-800 font-mono text-sm rounded-xl border border-stone-200 focus:outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition-all shadow-sm" placeholder="contoh: nama@batikhub.com">
          </div>
        </div>

        <!-- Input Password -->
        <div class="space-y-1.5">
          <label for="regPassword" class="text-[10px] font-bold text-stone-500 uppercase tracking-wider block">Kata Sandi (Password)</label>
          <div class="relative max-w-md">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-stone-400">
              <i data-lucide="key-round" class="w-4 h-4"></i>
            </span>
            <input type="text" id="regPassword" class="w-full pl-10 pr-4 py-2.5 bg-white text-stone-800 font-mono text-sm rounded-xl border border-stone-200 focus:outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition-all shadow-sm" placeholder="Buat kata sandi akun">
          </div>
        </div>

        <!-- Input Role (Dropdown Select) -->
        <div class="space-y-1.5">
          <label for="regRole" class="text-[10px] font-bold text-stone-500 uppercase tracking-wider block">Jabatan / Hak Akses (Role)</label>
          <div class="relative max-w-md">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-stone-400 pointer-events-none">
              <i data-lucide="shield" class="w-4 h-4"></i>
            </span>
            <select id="regRole" class="w-full pl-10 pr-10 py-2.5 bg-white text-stone-800 text-sm font-medium rounded-xl border border-stone-200 appearance-none focus:outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition-all shadow-sm">
              <option value="" disabled selected hidden>Pilih jabatan akses...</option>
              <option value="staff_admin">Staff Administrator</option>
              <option value="finance">Finance Divisi</option>
              <option value="HR">Human Resource</option>
            </select>
            <!-- Custom Arrow Dropdown -->
            <span class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-stone-400 pointer-events-none">
              <i data-lucide="chevron-down" class="w-4 h-4"></i>
            </span>
          </div>
        </div>

        <!-- GARIS PEMBATAS -->
        <hr class="border-stone-100 pt-2">

        <!-- TOMBOL AKSI (SAVE & BATAL) -->
        <div class="flex items-center justify-end gap-3">
          <!-- Tombol Batal -->
          <button type="button" class="px-5 py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-600 font-semibold text-xs rounded-xl transition-colors">
            Batal
          </button>
          
          <!-- Tombol Save -->
          <button type="submit" class="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-xs rounded-xl transition-colors shadow-sm">
            <i data-lucide="user-plus" class="w-3.5 h-3.5"></i> Simpan Karyawan
          </button>
        </div>

      </form>

    </div>

  </main>

  <!-- FOOTER PANEL -->
  <footer class="text-center py-6 text-xs text-stone-400 w-full bg-white border-t border-stone-100">
    &copy; 2026 BatikHub Staff Hub Nusantara. Hak Akses Registrasi Internal.
  </footer>

  <!-- CDN script untuk render icon Lucide -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
