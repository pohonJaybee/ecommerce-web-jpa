<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BatikHub - Masuk ke Akun</title>
  <!-- Menggunakan Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons untuk ikon modern -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#FBF9F4] text-stone-800 antialiased min-h-screen flex flex-col justify-between">

  <!-- NAVBAR -->
  <nav class="bg-white border-b border-stone-200/60 shadow-sm w-full">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center">
          <a href="#" class="text-2xl font-serif font-bold text-emerald-900 flex items-center gap-2 tracking-wide">
            <i data-lucide="sparkles" class="w-6 h-6 text-amber-600"></i>
            Batik<span class="text-amber-700 font-sans font-medium text-xl">Hub</span>
          </a>
        </div>

        <!-- Menu Navigasi Sederhana untuk Halaman Login -->
        <div class="flex items-center gap-4">
          <a href="#cari" class="text-sm font-medium text-stone-600 hover:text-emerald-900 transition-colors flex items-center gap-1">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali Jelajah
          </a>
        </div>

      </div>
    </div>
  </nav>

  <!-- KONTEN UTAMA HALAMAN LOGIN -->
  <main class="flex-grow flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl border border-stone-200/80 shadow-md">
      
      <!-- Judul & Logo Atas -->
      <div class="text-center space-y-2">
        <div class="mx-auto h-12 w-12 rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-800 border border-emerald-100">
          <i data-lucide="log-in" class="w-6 h-6"></i>
        </div>
        <h2 class="text-2xl font-serif font-bold text-emerald-950">Selamat Datang</h2>
        <p class="text-xs text-stone-500">Silakan masuk untuk melanjutkan transaksi dan melacak pesanan batik Anda.</p>
      </div>

      <!-- FORM LOGIN UTAMA -->
      <form class="space-y-5" action="#" method="POST">
        
        <!-- Input Email -->
        <div class="space-y-1.5">
          <label for="email" class="text-xs font-medium text-stone-500 block">Alamat Email</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <i data-lucide="mail" class="h-4 w-4 text-stone-400"></i>
            </div>
            <input 
              id="email" 
              name="email" 
              type="email" 
              required 
              class="w-full bg-white border border-stone-200 rounded-xl pl-10 pr-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-800 focus:border-emerald-800 transition-all placeholder-stone-400 font-medium" 
              placeholder="nama@email.com"
            >
          </div>
        </div>

        <!-- Input Password -->
        <div class="space-y-1.5">
          <div class="flex justify-between items-center">
            <label for="password" class="text-xs font-medium text-stone-500 block">Kata Sandi</label>
          </div>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
              <i data-lucide="lock" class="h-4 w-4 text-stone-400"></i>
            </div>
            <input 
              id="password" 
              name="password" 
              type="password" 
              required 
              class="w-full bg-white border border-stone-200 rounded-xl pl-10 pr-12 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-800 focus:border-emerald-800 transition-all placeholder-stone-400 font-mono" 
              placeholder="••••••••"
            >
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
              <i data-lucide="eye" class="w-4 h-4 text-stone-400 cursor-pointer hover:text-stone-600"></i>
            </div>
          </div>
        </div>

        <!-- Tombol Masuk Utama -->
        <button 
          type="submit" 
          class="w-full bg-emerald-800 text-white py-3 px-4 rounded-xl text-sm font-semibold hover:bg-emerald-950 active:scale-[0.98] transition-all shadow-md flex items-center justify-center gap-2 mt-2"
        >
          <span>Masuk</span> <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>

      </form>

      <!-- SEPARATOR / PEMBATAS METODE -->
      <div class="relative flex py-2 items-center text-xs text-stone-400">
        <div class="flex-grow border-t border-stone-200"></div>
        <span class="flex-shrink mx-3">Atau Metode Lain</span>
        <div class="flex-grow border-t border-stone-200"></div>
      </div>

      <!-- LINK LOGIN ALTERNATIF (MENGGUNAKAN ID GENERATOR PROFIL) -->
      <div class="text-center">
        <a 
          href="#login-id-generator" 
          class="inline-flex w-full items-center justify-center gap-2 border border-emerald-800/20 bg-emerald-50/40 hover:bg-emerald-50 text-emerald-800 px-4 py-3 rounded-xl text-xs font-semibold active:scale-[0.98] transition-all"
        >
          <i data-lucide="binary" class="w-4 h-4"></i> Masuk dengan ID Pengguna (System ID)
        </a>
      </div>

      <!-- LINK SIGN UP UNTUK VISITOR -->
      <div class="text-center pt-2 border-t border-stone-100">
        <p class="text-xs text-stone-500">
          Pengunjung baru? 
          <a href="#signup" class="text-emerald-800 font-bold hover:underline ml-1">Daftar Akun Baru</a>
        </p>
      </div>

    </div>
  </main>

  <!-- FOOTER SEDERHANA -->
  <footer class="text-center py-6 text-xs text-stone-400 w-full bg-white border-t border-stone-100">
    &copy; 2026 BatikHub Nusantara. All rights reserved.
  </footer>

  <!-- Script untuk inisialisasi Lucide Icons -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
