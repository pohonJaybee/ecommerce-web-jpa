<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BatikHub - Daftar Akun Baru</title>
  <!-- Menggunakan Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons untuk ikon modern -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#FBF9F4] text-stone-800 antialiased min-h-screen flex flex-col justify-between">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 bg-white border-b border-stone-200/60 shadow-sm w-full">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        
        <!-- Logo -->
        <div class="flex-shrink-0 flex items-center">
          <a href="#" class="text-2xl font-serif font-bold text-emerald-900 flex items-center gap-2 tracking-wide">
            <i data-lucide="sparkles" class="w-6 h-6 text-amber-600"></i>
            Batik<span class="text-amber-700 font-sans font-medium text-xl">Hub</span>
          </a>
        </div>

        <!-- Tautan Kembali Ke Login -->
        <div class="flex items-center gap-4">
          <p class="text-xs text-stone-500 hidden sm:block">Sudah punya akun?</p>
          <a href="#login" class="text-sm font-semibold text-emerald-800 hover:text-emerald-950 transition-colors">
            Masuk Masuk
          </a>
        </div>

      </div>
    </div>
  </nav>

  <!-- KONTEN UTAMA FORM REGISTRASI VISITOR -->
  <main class="flex-grow flex items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
    <div class="max-w-2xl w-full bg-white rounded-2xl border border-stone-200/80 shadow-md overflow-hidden">
      
      <!-- Header Card (Tema Hijau Nusantara khas Customer) -->
      <div class="bg-gradient-to-r from-emerald-950 to-emerald-900 px-6 py-8 text-white flex items-center gap-4">
        <div class="w-14 h-14 rounded-2xl bg-white/10 backdrop-blur-sm text-emerald-200 flex items-center justify-center shadow-inner border border-white/20 flex-shrink-0">
          <i data-lucide="user-plus" class="w-7 h-7"></i>
        </div>
        <div>
          <h1 class="text-xl font-serif font-bold tracking-wide text-amber-100">Gabung Sebagai Visitor</h1>
          <p class="text-xs text-emerald-200/80">Buat akun Anda untuk mulai menjelajahi dan mengoleksi batik terbaik.</p>
        </div>
      </div>

      <!-- Form Input Utama -->
      <form class="p-6 sm:p-8 space-y-6" action="#" method="POST">
        
        <!-- SECTION 1: DATA DIRI -->
        <div class="space-y-4">
          <h2 class="text-xs font-semibold text-emerald-900 uppercase tracking-wider border-b border-stone-100 pb-2 flex items-center gap-1.5">
            <i data-lucide="user" class="w-3.5 h-3.5"></i> Informasi Pribadi
          </h2>

          <!-- Input Nama -->
          <div class="space-y-1.5">
            <label for="name" class="text-xs font-medium text-stone-500 block">Nama Lengkap</label>
            <input 
              id="name"
              name="name"
              type="text" 
              required
              class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-800 focus:border-emerald-800 transition-all placeholder-stone-400 font-medium"
              placeholder="Contoh: Rapi"
            >
          </div>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Input Email -->
            <div class="space-y-1.5">
              <label for="email" class="text-xs font-medium text-stone-500 block">Alamat Email</label>
              <input 
                id="email"
                name="email"
                type="email" 
                required
                class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-800 focus:border-emerald-800 transition-all placeholder-stone-400 font-medium"
                placeholder="nama@email.com"
              >
            </div>

            <!-- Input Password -->
            <div class="space-y-1.5">
              <label for="password" class="text-xs font-medium text-stone-500 block">Kata Sandi (Password)</label>
              <div class="relative">
                <input 
                  id="password"
                  name="password"
                  type="password" 
                  required
                  class="w-full bg-white border border-stone-200 rounded-xl pl-4 pr-12 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-800 focus:border-emerald-800 transition-all placeholder-stone-400 font-mono"
                  placeholder="••••••••"
                >
                <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
                  <i data-lucide="eye" class="w-4 h-4 text-stone-400 cursor-pointer hover:text-stone-600"></i>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- SECTION 2: ALAMAT PENGIRIMAN -->
        <div class="space-y-4 pt-2">
          <h2 class="text-xs font-semibold text-emerald-900 uppercase tracking-wider border-b border-stone-100 pb-2 flex items-center gap-1.5">
            <i data-lucide="map-pin" class="w-3.5 h-3.5"></i> Alamat Pengiriman Kain
          </h2>

          <!-- Nama Jalan -->
          <div class="space-y-1.5">
            <label for="address_street" class="text-xs font-medium text-stone-500 block">Nama Jalan & No. Rumah</label>
            <textarea 
              id="address_street"
              name="address_street"
              rows="2" 
              required
              class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-800 focus:border-emerald-800 transition-all placeholder-stone-400 leading-relaxed"
              placeholder="Tulis nama jalan, nomor rumah, RT/RW, cluster, atau nomor apartemen..."
            ></textarea>
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Kota -->
            <div class="space-y-1.5">
              <label for="address_city" class="text-xs font-medium text-stone-500 block">Kota / Kabupaten</label>
              <input 
                id="address_city"
                name="address_city"
                type="text" 
                required
                class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-800 focus:border-emerald-800 transition-all placeholder-stone-400"
                placeholder="Contoh: Pekanbaru"
              >
            </div>

            <!-- Provinsi -->
            <div class="space-y-1.5">
              <label for="address_province" class="text-xs font-medium text-stone-500 block">Provinsi</label>
              <input 
                id="address_province"
                name="address_province"
                type="text" 
                required
                class="w-full bg-white border border-stone-200 rounded-xl px-4 py-3 text-sm text-stone-800 focus:outline-none focus:ring-2 focus:ring-emerald-800 focus:border-emerald-800 transition-all placeholder-stone-400"
                placeholder="Contoh: Riau"
              >
            </div>
          </div>
        </div>

        <!-- GRUP TOMBOL SAVE & BATAL -->
        <div class="flex items-center justify-end gap-3 pt-6 border-t border-stone-100 mt-8">
          <!-- Tombol Batal -->
          <button 
            type="button" 
            class="px-5 py-2.5 border border-stone-200 rounded-xl text-sm font-medium text-stone-600 bg-white hover:bg-stone-50 hover:text-stone-800 active:scale-95 transition-all shadow-sm"
          >
            Batal
          </button>
          <!-- Tombol Simpan -->
          <button 
            type="submit" 
            class="px-6 py-2.5 bg-emerald-800 text-white rounded-xl text-sm font-medium hover:bg-emerald-950 active:scale-95 transition-all shadow-md flex items-center gap-1.5"
          >
            <i data-lucide="save" class="w-4 h-4"></i> Simpan Akun
          </button>
        </div>

      </form>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="text-center py-6 text-xs text-stone-400 w-full bg-white border-t border-stone-100">
    &copy; 2026 BatikHub Nusantara. All rights reserved.
  </footer>

  <!-- Script untuk inisialisasi Lucide Icons -->
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
